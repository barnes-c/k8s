apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: barnes-biz
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/barnes-c/k8s
    path: manifests/barnes-biz
    targetRevision: master
  destination:
    server: https://kubernetes.default.svc
    namespace: barnes-biz
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
